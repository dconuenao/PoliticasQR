<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyCard - Políticas de Crédito</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f4f4; color: #333; display: flex; flex-direction: column; align-items: center; }
        
        /* Header con imagen implementada */
        header { width: 100%; text-align: center; background-color: white; padding: 20px 0; border-bottom: 1px solid #e0e0e0; }
        .header-logo { max-width: 250px; height: auto; }
        
        .vigencia { font-size: 12px; margin-top: 10px; color: #666; }
        
        /* Contenedor del PDF */
        .pdf-container { width: 90%; max-width: 800px; height: 75vh; margin-top: 20px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Botón de descarga opcional */
        .btn-descarga { margin-top: 25px; display: inline-block; background-color: #004a99; color: white; text-align: center; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; transition: background 0.3s; }
        .btn-descarga:hover { background-color: #003a7a; }
        
        footer { margin-top: 30px; font-size: 12px; color: #888; text-align: center; padding-bottom: 30px; }
    </style>
</head>
<body>

<header>
    <img src="header.png" alt="Header FamilyCard" class="header-logo">
    <div class="vigencia">Vigente desde abril 2025</div>
</header>

<div class="pdf-container">
    <iframe src="politicas.pdf#toolbar=0" type="application/pdf"></iframe>
</div>

<a href="politicas.pdf" download class="btn-descarga">⬇ Descargar copia PDF</a>

<footer>
    familycard.github.io/politicas<br>
    © FamilyCard Chile - Todos los derechos reservados
</footer>

</body>
</html>
